<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
      font-family: 'Inter', sans-serif;
      background-color: #000;
      color: #FFF;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      }
      .device-frame {
      width: 375px;
      height: 812px;
      background: #000;
      border-radius: 40px;
      box-shadow: 0 0 0 12px #2d2d2d, 0 20px 50px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
      border: 8px solid #000;
      }
      .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 30px;
      background: #000;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      z-index: 100;
      }
      .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: white;
      border-radius: 100px;
      opacity: 0.4;
      z-index: 1000;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="">
    <div class="device-frame">
      <div class="notch"></div>
      <div
        class="h-full bg-black text-white overflow-y-auto no-scrollbar pb-20"
      >
        <!-- Status Bar -->
        <div
          class="flex justify-between items-center px-6 pt-3.5 pb-2 text-white relative z-50"
        >
          <div class="text-sm font-semibold tracking-tight">9:41</div>
          <div class="flex items-center">
            <i
              data-lucide="battery-full"
              class="w-5 h-5 opacity-80"
              stroke-width="1.5"
            ></i>
          </div>
        </div>

        <!-- Header -->
        <div class="px-4 flex justify-between items-center mb-6 pt-1">
          <button class="text-white hover:opacity-70 transition-opacity">
            <i
              data-lucide="chevron-left"
              class="w-6 h-6"
              stroke-width="1.5"
            ></i>
          </button>
          <button class="text-white hover:opacity-70 transition-opacity">
            <i
              data-lucide="more-horizontal"
              class="w-6 h-6"
              stroke-width="1.5"
            ></i>
          </button>
        </div>

        <!-- Profile Info -->
        <div class="px-4 mb-6">
          <div class="flex items-center gap-5 mb-5">
            <!-- Avatar -->
            <div
              class="w-[88px] h-[88px] rounded-full overflow-hidden shrink-0 border border-white/10"
            >
              <img
                src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/917d6f93-fb36-439a-8c48-884b67b35381_1600w.jpg"
                class="w-full h-full object-cover"
              />
            </div>

            <!-- Stats & Actions -->
            <div class="flex-1 flex flex-col gap-3.5">
              <div class="flex justify-between px-1">
                <div class="flex flex-col items-center">
                  <span class="text-xs text-[#A1A1AA] mb-0.5">Captures</span>
                  <span class="text-sm font-semibold text-white">1,348</span>
                </div>
                <div class="flex flex-col items-center">
                  <span class="text-xs text-[#A1A1AA] mb-0.5">Followers</span>
                  <span class="text-sm font-semibold text-white">1,348</span>
                </div>
                <div class="flex flex-col items-center">
                  <span class="text-xs text-[#A1A1AA] mb-0.5">Following</span>
                  <span class="text-sm font-semibold text-white">1,348</span>
                </div>
              </div>
              <div class="flex gap-2.5 px-1">
                <button
                  class="h-[34px] bg-white text-black text-sm font-semibold rounded-lg flex items-center justify-center hover:bg-white/90 transition-colors w-[101px]"
                >
                  Follow
                </button>
              </div>
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <h1 class="text-2xl font-semibold tracking-tight text-white">
              Username
            </h1>
            <p class="leading-relaxed text-sm text-[#D4D4D8]">
              User Bio. Hey Guys. I love collecting art
              <br />
              Also I like these artwork.
            </p>
          </div>
        </div>

        <!-- Grid -->
        <div class="px-4 pb-8">
          <div class="grid grid-cols-2 gap-3">
            <!-- Card 1 -->
            <div
              class="relative w-full aspect-[4/5] rounded-[14px] overflow-hidden bg-[#1C1C1E] active:scale-[0.98] transition-transform"
            >
              <img
                src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/917d6f93-fb36-439a-8c48-884b67b35381_1600w.jpg"
                class="w-full h-full object-cover"
              />
              <div
                class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"
              ></div>
              <button
                class="absolute top-2 right-2 w-7 h-7 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white border border-white/10 hover:bg-black/60 transition-colors"
              >
                <i
                  data-lucide="more-horizontal"
                  class="w-4 h-4"
                  stroke-width="1.5"
                ></i>
              </button>
              <div class="absolute bottom-3 left-3 flex flex-col">
                <span class="text-xs text-white/80 font-medium mb-0.5">
                  2026-12-23
                </span>
                <span class="text-[13px] font-semibold text-white leading-snug">
                  Frieze London 2026
                </span>
              </div>
            </div>

            <!-- Card 2 -->

            </div>

            <!-- Card 4 -->

            >

            <!-- Card 5 -->

              </button>

              <div class="absolute bottom-3 left-3 flex flex-col">
                <span class="text-xs text-white/80 font-medium mb-0.5">

                </span>
                <span class="text-[13px] font-semibold text-white leading-snug">
                  December 23, 2026
                </span>
              </div>
            </div>

            <!-- Card 6 -->
            <div
              class="relative w-full aspect-[4/5] rounded-[14px] overflow-hidden bg-[#1C1C1E] active:scale-[0.98] transition-transform"
            >
              <img
                src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/30104e3c-5eea-4b93-93e9-5313698a7156_1600w.webp"

              <button

              >
                <i

                ></i>
              </button>

              <div class="absolute bottom-3 left-3 flex flex-col">
                <span class="text-xs text-white/80 font-medium mb-0.5">

          </div>
        </div>
      </div>
      <div class="home-indicator"></div>
    </div>

      lucide.createIcons();
